<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CodeLab Live IDE</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/editor/editor.main.min.css">
</head>

<body style="background:#1e1e1e; color:#fff; font-family:sans-serif; margin:0; padding:20px;">

    <h2>CodeLab Live Output Stream Sandbox</h2>
    <button id="runBtn"
        style="padding:10px 20px; background:#0e639c; color:white; border:none; cursor:pointer; font-weight:bold;">Run
        Code</button>

    <div style="display:flex; gap:20px; margin-top:20px; height:70vh;">
        <div id="editor" style="width:60%; border:1px solid #3c3c3c;"></div>
        <div style="width:40%; background:#000; padding:15px; border:1px solid #3c3c3c; box-sizing:border-box;">
            <h3>Terminal Output</h3>
            <pre id="output"
                style="color:#00ff00; font-family:monospace; white-space:pre-wrap; overflow-y:auto; height:85%;"></pre>
        </div>
    </div>

    <!-- Monaco Loading Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "import time\n\nprint('⏳ Initializing long calculation...')\ntime.sleep(2)\nprint('🔥 Working on chunk 1...')\ntime.sleep(2)\nprint('🚀 Done! Result: 42')",
                language: 'python',
                theme: 'vs-dark'
            });
        });

        // Connect to FastAPI WebSocket
        const ws = new WebSocket("ws://127.0.0.1:8000/ws/execute/adithya-test");
        const outputDiv = document.getElementById("output");

        ws.onmessage = function (event) {
            const data = JSON.parse(event.data);
            outputDiv.innerText += data.output + "\n";
        };

        document.getElementById("runBtn").onclick = function () {
            outputDiv.innerText = "🚀 Sending code to cluster...\n";
            const codeValue = window.editor.getValue();
            ws.send(json = JSON.stringify({ code: codeValue }));
        };
    </script>
</body>

</html>
